[tools]
# Keep interactive developer tooling in mise so language/runtime updates travel
# with the dotfiles repo instead of depending on host package managers.
bat = "latest"
bun = "latest"
dart = { version = "latest", url = "https://storage.googleapis.com/dart-archive/channels/stable/release/{{ version }}/sdk/dartsdk-{{ os() }}-{{ arch() }}-release.zip", version_list_url = "https://storage.googleapis.com/storage/v1/b/dart-archive/o?prefix=channels/stable/release/&delimiter=/", version_regex = 'channels/stable/release/(\d+\.\d+\.\d+)/' }
direnv = "latest"
# ffmpeg stays here even though Homebrew can provide it because yt-dlp and ad hoc
# media tooling should work the same way on Linux and macOS.
ffmpeg = "latest"
go = "latest"
lazydocker = "latest"
lazygit = "latest"
neovim = "0.12.1"
node = "lts"
pnpm = "latest"
python = "latest"
rust = "latest"
uv = "latest"
yt-dlp = "latest"
