---
- name: Bootstrap local workstation
  hosts: local
  gather_facts: true

  vars_prompt:
    - name: config_mode
      prompt: "Use repo-managed files by symlink or copy?"
      default: "copy"
      private: false
    - name: install_packages
      prompt: "Install base packages for this OS, including shell tools and language build dependencies?"
      default: "yes"
      private: false
    - name: install_optional_packages
      prompt: "Install optional OS packages used in daily CLI work: aria2, htop, btop, ctop, watch, fd/fdfind?"
      default: "yes"
      private: false
    - name: install_workspace_dirs
      prompt: "Create common workspace directories such as ~/src?"
      default: "yes"
      private: false
    - name: install_mise_direnv
      prompt: "Install mise and direnv? direnv will be installed through mise."
      default: "yes"
      private: false
    - name: trust_mise_config
      prompt: "Trust your existing global mise config if one exists?"
      default: "yes"
      private: false
    - name: install_wifi_helper
      prompt: "Install the macOS wifi helper into ~/.local/bin?"
      default: "no"
      private: false
    - name: install_proxmox_helper
      prompt: "Install the Proxmox updateProxmoxGuestIp helper into ~/.local/bin?"
      default: "no"
      private: false
    - name: install_newt_service_helper
      prompt: "Install the newt_service helper into ~/.local/bin? This is only for manual post-install use after Newt is already installed."
      default: "no"
      private: false
    - name: install_fetchall_helper
      prompt: "Install the fetchall helper into ~/.local/bin?"
      default: "yes"
      private: false
    - name: install_aliases
      prompt: "Install aliases and source them from ~/.zshrc and ~/.bashrc?"
      default: "yes"
      private: false
    - name: install_profiles
      prompt: "Install shell, git, p10k, and mise profile/config files from this repo?"
      default: "yes"
      private: false
    - name: install_tmux
      prompt: "Install ~/.tmux.conf, tpack, and tmux plugins?"
      default: "yes"
      private: false
    - name: install_zsh_theme
      prompt: "Install Zim and Powerlevel10k?"
      default: "yes"
      private: false

  vars:
    repo_root: "{{ playbook_dir }}"
    home_dir: "{{ ansible_facts.env.HOME }}"
    bin_dir: "{{ ansible_facts.env.HOME }}/.local/bin"
    aliases_file: "{{ ansible_facts.env.HOME }}/.aliases"
    tmux_plugin_dir: "{{ ansible_facts.env.HOME }}/.tmux/plugins"
    tpack_dir: "{{ tmux_plugin_dir }}/tpm"
    mise_config_file: "{{ ansible_facts.env.XDG_CONFIG_HOME | default(ansible_facts.env.HOME + '/.config') }}/mise/config.toml"
    zimfw_version: "v1.20.0"
    zimfw_download_url: "https://github.com/zimfw/zimfw/releases/download/{{ zimfw_version }}/zimfw.zsh"
    base_packages:
      - bash
      - ca-certificates
      - curl
      - wget
      - git
      - jq
      - ripgrep
      - tmux
      - zsh
      - zlib1g-dev
      - build-essential
      - libssl-dev
      - libyaml-dev
      - libreadline-dev
      - libffi-dev
      - autoconf
      - bison
    macos_base_packages:
      - bash
      - ca-certificates
      - curl
      - wget
      - git
      - jq
      - ripgrep
      - tmux
      - zsh
      - zlib
      - openssl@3
      - libyaml
      - readline
      - libffi
      - autoconf
      - bison
      - pkg-config
    optional_packages:
      - aria2
      - htop
      - btop
      - ctop
      - watch
    optional_linux_packages:
      - fd-find
    optional_macos_packages:
      - fd
    workspace_dirs:
      - "{{ home_dir }}/src"
    tmux_plugins:
      - tmux-sensible
      - tmux-resurrect
      - tmux-continuum
    home_dotfiles:
      - src: dotfiles/zshrc
        dest: .zshrc
      - src: dotfiles/bashrc
        dest: .bashrc
      - src: dotfiles/profile
        dest: .profile
      - src: dotfiles/zimrc
        dest: .zimrc
      - src: dotfiles/p10k.zsh
        dest: .p10k.zsh
      - src: dotfiles/gitconfig
        dest: .gitconfig
    xdg_config_files:
      - src: config/mise/config.toml
        dest: mise/config.toml
      - src: config/git/ignore
        dest: git/ignore

  pre_tasks:
    - name: Validate config mode
      ansible.builtin.assert:
        that:
          - config_mode in ['symlink', 'copy']
        fail_msg: "config_mode must be symlink or copy"

    - name: Validate yes/no prompts
      ansible.builtin.assert:
        that:
          - (lookup('vars', item) | lower) in ['yes', 'no']
        fail_msg: "{{ item }} must be yes or no"
      loop:
        - install_packages
        - install_optional_packages
        - install_workspace_dirs
        - install_mise_direnv
        - trust_mise_config
        - install_wifi_helper
        - install_proxmox_helper
        - install_newt_service_helper
        - install_fetchall_helper
        - install_aliases
        - install_profiles
        - install_tmux
        - install_zsh_theme

    - name: Validate non-interactive confirmation
      ansible.builtin.assert:
        that:
          - (confirm_install | lower) in ['yes', 'no']
        fail_msg: "confirm_install must be yes or no"
      when: confirm_install is defined

    - name: Show install summary
      ansible.builtin.debug:
        msg:
          - "File mode: {{ config_mode }}"
          - "Packages: {{ install_packages }}"
          - "Optional packages: {{ install_optional_packages }}"
          - "Workspace directories: {{ install_workspace_dirs }} -> {{ workspace_dirs }}"
          - "Mise + direnv: {{ install_mise_direnv }}"
          - "Trust mise config: {{ trust_mise_config }}"
          - "Wifi helper: {{ install_wifi_helper }} -> {{ bin_dir }}"
          - "Proxmox helper: {{ install_proxmox_helper }} -> {{ bin_dir }}"
          - "Newt service helper: {{ install_newt_service_helper }} -> {{ bin_dir }}"
          - "Fetchall helper: {{ install_fetchall_helper }} -> {{ bin_dir }}"
          - "Aliases: {{ install_aliases }} -> {{ aliases_file }}"
          - "Profiles/configs: {{ install_profiles }}"
          - "Tmux/tpack: {{ install_tmux }} -> {{ tmux_plugin_dir }}"
          - "Zim + p10k: {{ install_zsh_theme }}"

    - name: Confirm installation
      ansible.builtin.pause:
        prompt: "Start installation with these answers? Type yes to continue"
      register: install_confirmation
      when: confirm_install is not defined

    - name: Stop before making changes
      ansible.builtin.meta: end_play
      when: (install_confirmation.user_input | default(confirm_install | default('no')) | lower) != 'yes'

    - name: Prepare sudo for Linux package changes
      when:
        - install_packages | bool
        - ansible_facts.system == 'Linux'
        - ansible_facts.user_id != 'root'
      block:
        - name: Check for sudo on Linux
          ansible.builtin.command:
            argv:
              - sh
              - -lc
              - command -v sudo
          changed_when: false
          register: linux_sudo_check
          failed_when: false

        - name: Stop if sudo is unavailable for Linux package changes
          ansible.builtin.fail:
            msg: "Linux package installation requires sudo. Rerun as root or pass install_packages=no."
          when: linux_sudo_check.rc != 0

        - name: Check for cached or passwordless sudo on Linux
          ansible.builtin.command:
            argv:
              - sudo
              - -n
              - "true"
          changed_when: false
          register: linux_sudo_noninteractive
          failed_when: false
          when: ansible_become_password is not defined

        - name: Ask for sudo password for Linux package changes
          ansible.builtin.pause:
            prompt: "sudo password"
            echo: false
          register: linux_sudo_password_prompt
          no_log: true
          when:
            - ansible_become_password is not defined
            - linux_sudo_noninteractive.rc | default(1) != 0

        - name: Use prompted sudo password for Linux package changes
          ansible.builtin.set_fact:
            ansible_become_password: "{{ linux_sudo_password_prompt.user_input }}"
          no_log: true
          when: >
            linux_sudo_password_prompt is defined
            and not (linux_sudo_password_prompt.skipped | default(false))

        - name: Validate sudo password for Linux package changes
          ansible.builtin.command:
            argv:
              - sudo
              - -S
              - -p
              - ""
              - -v
            stdin: "{{ linux_sudo_password_prompt.user_input }}"
          changed_when: false
          register: linux_sudo_password_validation
          failed_when: false
          no_log: true
          when: >
            linux_sudo_password_prompt is defined
            and not (linux_sudo_password_prompt.skipped | default(false))

        - name: Stop if sudo authentication fails for Linux package changes
          ansible.builtin.fail:
            msg: "sudo authentication failed or this user is not permitted to use sudo. Rerun as root, pass install_packages=no, or run sudo -v before rerunning."
          when: >
            linux_sudo_password_validation is defined
            and not (linux_sudo_password_validation.skipped | default(false))
            and linux_sudo_password_validation.rc != 0

  tasks:
    - name: Install base packages on Linux
      ansible.builtin.package:
        name: "{{ base_packages }}"
        state: present
      become: "{{ ansible_facts.user_id != 'root' }}"
      when:
        - install_packages | bool
        - ansible_facts.system == 'Linux'

    - name: Install optional packages on Linux
      ansible.builtin.package:
        name: "{{ item }}"
        state: present
      become: "{{ ansible_facts.user_id != 'root' }}"
      loop: "{{ optional_packages + optional_linux_packages }}"
      failed_when: false
      when:
        - install_packages | bool
        - install_optional_packages | bool
        - ansible_facts.system == 'Linux'

    - name: Find zsh on Linux
      ansible.builtin.command: sh -lc 'command -v zsh'
      changed_when: false
      register: linux_zsh_path
      when:
        - install_packages | bool
        - ansible_facts.system == 'Linux'

    - name: Set zsh as default shell on Linux
      ansible.builtin.user:
        name: "{{ ansible_facts.user_id }}"
        shell: "{{ linux_zsh_path.stdout }}"
      become: "{{ ansible_facts.user_id != 'root' }}"
      when:
        - install_packages | bool
        - ansible_facts.system == 'Linux'
        - linux_zsh_path.stdout | length > 0

    - name: Check for Homebrew on macOS
      ansible.builtin.shell: |
        if command -v brew >/dev/null 2>&1; then
          command -v brew
        elif [ -x /opt/homebrew/bin/brew ]; then
          printf '%s\n' /opt/homebrew/bin/brew
        elif [ -x /usr/local/bin/brew ]; then
          printf '%s\n' /usr/local/bin/brew
        fi
      args:
        executable: /bin/sh
      changed_when: false
      failed_when: false
      register: brew_check
      when:
        - install_packages | bool
        - ansible_facts.system == 'Darwin'

    - name: Stop if Homebrew is missing on macOS
      ansible.builtin.fail:
        msg: "Homebrew is required to install macOS packages. Install it from https://brew.sh/ or rerun with install_packages=no."
      when:
        - install_packages | bool
        - ansible_facts.system == 'Darwin'
        - brew_check.stdout | trim == ''

    - name: Set Homebrew binary path
      ansible.builtin.set_fact:
        brew_bin: "{{ brew_check.stdout | trim }}"
      when:
        - install_packages | bool
        - ansible_facts.system == 'Darwin'
        - brew_check.stdout | trim != ''

    - name: Install base packages on macOS
      ansible.builtin.shell: |
        if "{{ brew_bin }}" list --formula "{{ item }}" >/dev/null 2>&1; then
          exit 0
        fi
        "{{ brew_bin }}" install "{{ item }}"
        echo "__changed__"
      args:
        executable: /bin/sh
      loop: "{{ macos_base_packages }}"
      register: brew_base_install
      changed_when: "'__changed__' in brew_base_install.stdout"
      when:
        - install_packages | bool
        - ansible_facts.system == 'Darwin'
        - brew_bin is defined

    - name: Install optional packages on macOS
      ansible.builtin.shell: |
        if "{{ brew_bin }}" list --formula "{{ item }}" >/dev/null 2>&1; then
          exit 0
        fi
        "{{ brew_bin }}" install "{{ item }}"
        echo "__changed__"
      args:
        executable: /bin/sh
      loop: "{{ optional_packages + optional_macos_packages }}"
      register: brew_optional_install
      changed_when: "'__changed__' in brew_optional_install.stdout"
      failed_when: false
      when:
        - install_packages | bool
        - install_optional_packages | bool
        - ansible_facts.system == 'Darwin'
        - brew_bin is defined

    - name: Create local bin directory
      ansible.builtin.file:
        path: "{{ bin_dir }}"
        state: directory
        mode: "0755"
      when: install_wifi_helper | bool or install_proxmox_helper | bool or install_newt_service_helper | bool or install_fetchall_helper | bool or install_mise_direnv | bool

    - name: Create workspace directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop: "{{ workspace_dirs }}"
      when: install_workspace_dirs | bool

    - name: Refuse wifi helper install outside macOS
      ansible.builtin.fail:
        msg: "wifi helper only supports macOS"
      when:
        - install_wifi_helper | bool
        - ansible_facts.system != 'Darwin'

    - name: Refuse newt service helper install outside Linux systemd hosts
      ansible.builtin.fail:
        msg: "newt_service helper is only supported on Linux hosts running systemd"
      when:
        - install_newt_service_helper | bool
        - ansible_facts.system != 'Linux' or ansible_service_mgr != 'systemd'

    - name: Install wifi helper by symlink
      ansible.builtin.file:
        src: "{{ repo_root }}/wifi.sh"
        dest: "{{ bin_dir }}/wifi"
        state: link
        force: true
      when:
        - install_wifi_helper | bool
        - config_mode == 'symlink'
        - ansible_facts.system == 'Darwin'

    - name: Install wifi helper by copy
      ansible.builtin.copy:
        src: "{{ repo_root }}/wifi.sh"
        dest: "{{ bin_dir }}/wifi"
        mode: "0755"
      when:
        - install_wifi_helper | bool
        - config_mode == 'copy'
        - ansible_facts.system == 'Darwin'

    - name: Install Proxmox helper by symlink
      ansible.builtin.file:
        src: "{{ repo_root }}/updateProxmoxGuestIp.sh"
        dest: "{{ bin_dir }}/updateProxmoxGuestIp"
        state: link
        force: true
      when:
        - install_proxmox_helper | bool
        - config_mode == 'symlink'

    - name: Install Proxmox helper by copy
      ansible.builtin.copy:
        src: "{{ repo_root }}/updateProxmoxGuestIp.sh"
        dest: "{{ bin_dir }}/updateProxmoxGuestIp"
        mode: "0755"
      when:
        - install_proxmox_helper | bool
        - config_mode == 'copy'

    - name: Install newt service helper by symlink
      ansible.builtin.file:
        src: "{{ repo_root }}/newt_service.sh"
        dest: "{{ bin_dir }}/newt_service"
        state: link
        force: true
      when:
        - install_newt_service_helper | bool
        - config_mode == 'symlink'
        - ansible_facts.system == 'Linux'
        - ansible_service_mgr == 'systemd'

    - name: Install newt service helper by copy
      ansible.builtin.copy:
        src: "{{ repo_root }}/newt_service.sh"
        dest: "{{ bin_dir }}/newt_service"
        mode: "0755"
      when:
        - install_newt_service_helper | bool
        - config_mode == 'copy'
        - ansible_facts.system == 'Linux'
        - ansible_service_mgr == 'systemd'

    - name: Install fetchall helper by symlink
      ansible.builtin.file:
        src: "{{ repo_root }}/fetchall.sh"
        dest: "{{ bin_dir }}/fetchall"
        state: link
        force: true
      when:
        - install_fetchall_helper | bool
        - config_mode == 'symlink'

    - name: Install fetchall helper by copy
      ansible.builtin.copy:
        src: "{{ repo_root }}/fetchall.sh"
        dest: "{{ bin_dir }}/fetchall"
        mode: "0755"
      when:
        - install_fetchall_helper | bool
        - config_mode == 'copy'

    - name: Install aliases by symlink
      ansible.builtin.file:
        src: "{{ repo_root }}/alias"
        dest: "{{ aliases_file }}"
        state: link
        force: true
      when:
        - install_aliases | bool
        - config_mode == 'symlink'

    - name: Install aliases by copy
      ansible.builtin.copy:
        src: "{{ repo_root }}/alias"
        dest: "{{ aliases_file }}"
        mode: "0644"
      when:
        - install_aliases | bool
        - config_mode == 'copy'

    - name: Install home profile files by symlink
      ansible.builtin.file:
        src: "{{ repo_root }}/{{ item.src }}"
        dest: "{{ home_dir }}/{{ item.dest }}"
        state: link
        force: true
      loop: "{{ home_dotfiles }}"
      when:
        - install_profiles | bool
        - config_mode == 'symlink'

    - name: Install home profile files by copy
      ansible.builtin.copy:
        src: "{{ repo_root }}/{{ item.src }}"
        dest: "{{ home_dir }}/{{ item.dest }}"
        mode: "0644"
      loop: "{{ home_dotfiles }}"
      when:
        - install_profiles | bool
        - config_mode == 'copy'

    - name: Create XDG config directories
      ansible.builtin.file:
        path: "{{ home_dir }}/.config/{{ item.dest | dirname }}"
        state: directory
        mode: "0755"
      loop: "{{ xdg_config_files }}"
      when: install_profiles | bool

    - name: Install XDG config files by symlink
      ansible.builtin.file:
        src: "{{ repo_root }}/{{ item.src }}"
        dest: "{{ home_dir }}/.config/{{ item.dest }}"
        state: link
        force: true
      loop: "{{ xdg_config_files }}"
      when:
        - install_profiles | bool
        - config_mode == 'symlink'

    - name: Install XDG config files by copy
      ansible.builtin.copy:
        src: "{{ repo_root }}/{{ item.src }}"
        dest: "{{ home_dir }}/.config/{{ item.dest }}"
        mode: "0644"
      loop: "{{ xdg_config_files }}"
      when:
        - install_profiles | bool
        - config_mode == 'copy'

    - name: Source aliases from shell rc files
      ansible.builtin.blockinfile:
        path: "{{ item }}"
        create: true
        marker: "# {mark} init aliases"
        block: |
          [ -f "$HOME/.aliases" ] && . "$HOME/.aliases"
      loop:
        - "{{ home_dir }}/.zshrc"
        - "{{ home_dir }}/.bashrc"
      when:
        - install_aliases | bool
        - not (config_mode == 'symlink' and install_profiles | bool)

    - name: Install tmux config by symlink
      ansible.builtin.file:
        src: "{{ repo_root }}/.tmux.conf"
        dest: "{{ home_dir }}/.tmux.conf"
        state: link
        force: true
      when:
        - install_tmux | bool
        - config_mode == 'symlink'

    - name: Install tmux config by copy
      ansible.builtin.copy:
        src: "{{ repo_root }}/.tmux.conf"
        dest: "{{ home_dir }}/.tmux.conf"
        mode: "0644"
      when:
        - install_tmux | bool
        - config_mode == 'copy'

    - name: Create tmux plugin directory
      ansible.builtin.file:
        path: "{{ tmux_plugin_dir }}"
        state: directory
        mode: "0755"
      when: install_tmux | bool

    - name: Install or update tpack
      ansible.builtin.git:
        repo: https://github.com/tmuxpack/tpack
        dest: "{{ tpack_dir }}"
        update: false
      when: install_tmux | bool

    - name: Check tmux plugin directories
      ansible.builtin.stat:
        path: "{{ tmux_plugin_dir }}/{{ item }}"
      loop: "{{ tmux_plugins }}"
      register: tmux_plugin_stats
      when: install_tmux | bool

    - name: Install tmux plugins through tpack
      ansible.builtin.command: "{{ tpack_dir }}/bin/install_plugins"
      register: tpack_install
      changed_when: "'download success' in tpack_install.stdout"
      when:
        - install_tmux | bool
        - tmux_plugin_stats.results | selectattr('stat.exists', 'equalto', false) | list | length > 0

    - name: Check for running tmux server
      ansible.builtin.command: tmux has-session
      changed_when: false
      failed_when: false
      register: tmux_has_session
      when: install_tmux | bool

    - name: Source tmux config
      ansible.builtin.command: "tmux source-file {{ home_dir }}/.tmux.conf"
      changed_when: false
      when:
        - install_tmux | bool
        - tmux_has_session.rc == 0

    - name: Check for mise
      ansible.builtin.command: sh -lc 'command -v mise'
      changed_when: false
      failed_when: false
      register: mise_check
      when: install_mise_direnv | bool

    - name: Install mise if missing
      ansible.builtin.get_url:
        url: https://mise.jdx.dev/install.sh
        dest: "{{ bin_dir }}/mise-install.sh"
        mode: "0755"
      args:
        creates: "{{ bin_dir }}/mise-install.sh"
      register: mise_installer_download
      when:
        - install_mise_direnv | bool
        - mise_check.rc != 0

    - name: Run pinned mise installer
      ansible.builtin.command:
        argv:
          - sh
          - "{{ bin_dir }}/mise-install.sh"
      environment:
        MISE_VERSION: "v2026.4.14"
        MISE_INSTALL_PATH: "{{ bin_dir }}/mise"
      args:
        creates: "{{ bin_dir }}/mise"
      when:
        - install_mise_direnv | bool
        - mise_check.rc != 0

    - name: Set mise binary path
      ansible.builtin.set_fact:
        mise_bin: "{{ mise_check.stdout if mise_check.rc == 0 else bin_dir + '/mise' }}"
      when: install_mise_direnv | bool

    - name: Check global mise config
      ansible.builtin.stat:
        path: "{{ mise_config_file }}"
      register: mise_config_stat
      when: install_mise_direnv | bool

    - name: Trust existing global mise config
      ansible.builtin.command:
        argv:
          - "{{ mise_bin }}"
          - trust
          - -y
          - "{{ mise_config_file }}"
      changed_when: false
      when:
        - install_mise_direnv | bool
        - trust_mise_config | bool
        - mise_config_stat.stat.exists

    - name: Check missing global mise tools
      ansible.builtin.command:
        argv:
          - "{{ mise_bin }}"
          - install
          - --dry-run-code
      changed_when: false
      failed_when: mise_install_check.rc not in [0, 1]
      register: mise_install_check
      when: install_mise_direnv | bool

    - name: Install global mise tools
      ansible.builtin.command:
        argv:
          - "{{ mise_bin }}"
          - install
          - --yes
      when:
        - install_mise_direnv | bool
        - mise_install_check.rc == 1

    - name: Check global direnv mise entry
      ansible.builtin.command:
        argv:
          - "{{ mise_bin }}"
          - ls
          - -g
          - --current
          - --no-header
          - direnv
      changed_when: false
      failed_when: false
      register: mise_direnv_entry
      when: install_mise_direnv | bool

    - name: Install direnv through mise
      ansible.builtin.command:
        argv:
          - "{{ mise_bin }}"
          - use
          - -g
          - --yes
          - direnv@latest
      register: mise_use_direnv
      changed_when: "'direnv' not in (mise_direnv_entry.stdout | default(''))"
      when:
        - install_mise_direnv | bool
        - "'direnv' not in (mise_direnv_entry.stdout | default(''))"

    - name: Upgrade installed mise tools
      ansible.builtin.command:
        argv:
          - "{{ mise_bin }}"
          - upgrade
      register: mise_upgrade
      changed_when: "'All tools are up to date' not in (mise_upgrade.stdout | default(''))"
      failed_when: false
      when: install_mise_direnv | bool

    - name: List installed mise tools
      ansible.builtin.command:
        argv:
          - "{{ mise_bin }}"
          - ls
      changed_when: false
      register: mise_ls
      when: install_mise_direnv | bool

    - name: Show mise status
      ansible.builtin.debug:
        msg: "{{ [mise_upgrade.stdout | default(''), mise_upgrade.stderr | default(''), 'Installed mise tools:'] + (mise_ls.stdout_lines | default([])) }}"
      when: install_mise_direnv | bool

    - name: Add mise and direnv shell hooks
      ansible.builtin.blockinfile:
        path: "{{ item.path }}"
        create: true
        marker: "# {mark} init mise and direnv"
        block: |
          command -v mise >/dev/null 2>&1 && eval "$(mise activate {{ item.shell }} --quiet)"
          command -v direnv >/dev/null 2>&1 && eval "$(direnv hook {{ item.shell }})"
      loop:
        - path: "{{ home_dir }}/.zshrc"
          shell: zsh
        - path: "{{ home_dir }}/.bashrc"
          shell: bash
      when:
        - install_mise_direnv | bool
        - not (config_mode == 'symlink' and install_profiles | bool)

    - name: Check Zim install
      ansible.builtin.stat:
        path: "{{ home_dir }}/.zim/zimfw.zsh"
      register: zimfw_stat
      when: install_zsh_theme | bool

    - name: Install Zim if missing
      ansible.builtin.file:
        path: "{{ home_dir }}/.zim"
        state: directory
        mode: "0755"
      when:
        - install_zsh_theme | bool
        - not zimfw_stat.stat.exists

    - name: Download pinned Zim release asset
      ansible.builtin.get_url:
        url: "{{ zimfw_download_url }}"
        dest: "{{ home_dir }}/.zim/zimfw.zsh"
        mode: "0755"
      register: zimfw_download
      when:
        - install_zsh_theme | bool
        - not zimfw_stat.stat.exists

    - name: Install or update Powerlevel10k module
      ansible.builtin.git:
        repo: https://github.com/romkatv/powerlevel10k.git
        dest: "{{ home_dir }}/.zim/modules/powerlevel10k"
        depth: 1
        update: false
      when: install_zsh_theme | bool

    - name: Build and sync Zim modules
      ansible.builtin.shell: |
        set -euo pipefail
        export ZIM_HOME="{{ home_dir }}/.zim"
        zimfw() { source "$ZIM_HOME/zimfw.zsh" "$@"; }
        zimfw install
        zimfw update
        zimfw build
      args:
        executable: /bin/zsh
      register: zimfw_sync
      changed_when: false
      when:
        - install_zsh_theme | bool
        - zimfw_stat.stat.exists or not (zimfw_download.skipped | default(false))

    - name: Add Zim initialization to zshrc
      ansible.builtin.blockinfile:
        path: "{{ home_dir }}/.zshrc"
        create: true
        marker: "# {mark} init zim"
        block: |
          export ZIM_HOME="${ZDOTDIR:-$HOME}/.zim"
          [ -f "$ZIM_HOME/init.zsh" ] && source "$ZIM_HOME/init.zsh"
          [ -f "$ZIM_HOME/zimfw.zsh" ] && zimfw() { source "$ZIM_HOME/zimfw.zsh" "$@"; }
      when:
        - install_zsh_theme | bool
        - not (config_mode == 'symlink' and install_profiles | bool)

    - name: Add Powerlevel10k auto-config to zshrc
      ansible.builtin.blockinfile:
        path: "{{ home_dir }}/.zshrc"
        create: true
        marker: "# {mark} init p10k configure"
        block: |
          if [ ! -f "$HOME/.p10k.zsh" ] && command -v p10k >/dev/null 2>&1; then
            (sleep 1; p10k configure) &
          fi
      when:
        - install_zsh_theme | bool
        - not (config_mode == 'symlink' and install_profiles | bool)
